<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DeepSeek Sidebar</title>
  <style>
    :root {
      color-scheme: light;
      --panel-bg: #f7f8fb;
      --card-bg: rgba(255, 255, 255, 0.96);
      --card-border: rgba(15, 23, 42, 0.08);
      --title: #0f172a;
      --body: #475569;
      --hint: #64748b;
      --brand: #0066cc;
      --brand-dark: #0052a3;
      --secondary: #e2e8f0;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--panel-bg);
    }

    body {
      position: relative;
    }

    #container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
              radial-gradient(circle at top, rgba(0, 102, 204, 0.12), transparent 35%),
              linear-gradient(180deg, #fbfcff 0%, #f5f7fb 100%);
    }

    #chat-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: #ffffff;
      transition: opacity 0.2s ease;
    }

    #auth-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    body[data-panel-state="auth-required"] #auth-overlay,
    body[data-panel-state="checking-session"] #auth-overlay {
      display: flex;
    }

    body[data-panel-state="auth-required"] #chat-frame,
    body[data-panel-state="checking-session"] #chat-frame {
      opacity: 0.18;
      pointer-events: none;
    }

    .auth-card {
      width: min(100%, 360px);
      padding: 22px;
      border-radius: 18px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
      box-sizing: border-box;
    }

    .auth-card__eyebrow {
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--brand);
    }

    .auth-card__title {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.2;
      color: var(--title);
    }

    .auth-card__description {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      color: var(--body);
    }

    .auth-card__actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .auth-card__button {
      flex: 1;
      min-height: 42px;
      border: 0;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .auth-card__button:hover {
      transform: translateY(-1px);
    }

    .auth-card__button--primary {
      color: #ffffff;
      background: var(--brand);
      box-shadow: 0 10px 25px rgba(0, 102, 204, 0.28);
    }

    .auth-card__button--primary:hover {
      background: var(--brand-dark);
    }

    .auth-card__button--secondary {
      color: var(--title);
      background: var(--secondary);
    }

    .auth-card__hint {
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.5;
      color: var(--hint);
    }
  </style>
</head>
<body data-panel-state="loading">
<div id="container">
  <iframe id="chat-frame" src="https://chat.deepseek.com/"></iframe>

  <div id="auth-overlay">
    <div class="auth-card">
      <div class="auth-card__eyebrow">Session Required</div>
      <h1 id="auth-title" class="auth-card__title">Sign in manually to continue</h1>
      <p id="auth-description" class="auth-card__description">
        Open the DeepSeek login page in a regular tab and complete sign-in there. When the session is ready, reload the panel and continue chatting.
      </p>
      <div class="auth-card__actions">
        <button id="open-login-button" class="auth-card__button auth-card__button--primary" type="button">Open login page</button>
        <button id="reload-button" class="auth-card__button auth-card__button--secondary" type="button">Reload panel</button>
      </div>
      <div id="auth-hint" class="auth-card__hint">The extension does not log in automatically.</div>
    </div>
  </div>
</div>

<script src="sidepanel.js"></script>
</body>
</html>
