packages:
  # Существующие пакеты
  - "packages/*"
  - "apps/*"
  - "tooling/*"
  # ❌ Явно исключаем остальные Directory/*
  - "!Directory/*"

  # Исключаем тестовые и скомпилированные директории
  - "!**/__tests__/fixtures"
  - "!**/dist"
  - "!**/build"
  - "!**/coverage"
  - "!**/.turbo"
  - "!**/node_modules"

minimumReleaseAge: 0
