packages:
  # Основные пакеты монорепозитория
  - "packages/*"
  - "tooling/*"

  # Приложения (если есть)
  - "apps/*"

  # Стандартные исключения
  - "!**/node_modules"
  - "!**/dist"
  - "!**/build"
  - "!**/coverage"
  - "!**/.turbo"
  - "!**/__tests__/fixtures"
  - "!**/test-temp-*"
  - "!**/*.backup.*"

# Настройки для pnpm
allowBuilds:
  '@infoenergo/asuse-reports-ui': false
  "@parcel/watcher": false
  core-js: false
  esbuild: true
  inferno: false
  tree-sitter-wasms: true
  vue-demi: false
  yorkie: false

# Минимальный возраст релизов (0 - отключено)
minimumReleaseAge: 0

# Строгие peer зависимости
strict-peer-dependencies: true

# Автоматическая установка peer dependencies
auto-install-peers: true

# Запретить обновление lock-файлов другими менеджерами
package-lock: false
yarn-lock: false

# Shared store для экономии места
shared-workspace-lockfile: true
