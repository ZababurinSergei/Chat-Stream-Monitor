packages:
  # Существующие пакеты
  - "packages/*"
  - "apps/*"
  - "tooling/*"

  # ✅ Добавляем Directory и все его поддиректории
  - "Directory/*"

  # ❌ Исключаем пользовательские/временные директории
  - "!Directory/10"
  - "!Directory/11"
  - "!Directory/12"
  - "!Directory/13"
  - "!Directory/typescript-sdk"

  # Исключаем тестовые и скомпилированные директории
  - "!**/__tests__/fixtures"
  - "!**/dist"
  - "!**/build"
  - "!**/coverage"
  - "!**/.turbo"
  - "!**/node_modules"

  # Исключаем скрытые директории
  - "!**/.*"
allowBuilds:
  '@parcel/watcher': false
  esbuild: false
minimumReleaseAgeExclude:
  - eslint@10.5.0
